            speakText(text, lang = 'fr-FR') {

                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = lang;
                    utterance.rate = 0.9;
                    utterance.pitch = 1;
                    speechSynthesis.cancel();
                    speechSynthesis.speak(utterance);
                } else {
                    alert('Speech synthesis not supported in your browser');
                }
            }

                if (this.state.searchTerm.trim() === '') {
                    this.state.dictionaryResults = [];
                    return;
                }
                const results = this.frenchDictionary.filter(entry =>
                    entry.french.toLowerCase().includes(this.state.searchTerm.toLowerCase()) ||
                    entry.english.toLowerCase().includes(this.state.searchTerm.toLowerCase())
                );
                this.state.dictionaryResults = results;
                this.render();
            }

                            <div class="text-5xl mb-4">👑</div>
                            <h4 class="text-2xl font-bold text-gray-800 mb-2">Advanced</h4>
                            <p class="text-gray-600 mb-4">Reach fluency. Business French, subjunctive, idioms, and culture.</p>
                            <div class="text-sm text-pink-600 font-semibold">5 Lessons • 8 Quiz Questions</div>
                        </div>
                    </div>
                `;

                const dictionaryHtml = `
                    <div class="mt-16 bg-white rounded-xl shadow-lg p-8">
                        <h3 class="text-3xl font-bold text-gray-900 mb-6">🔊 French Dictionary</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="searchInput" placeholder="Search French or English words..." class="flex-1 px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500" value="${this.state.searchTerm}" />
                            <button onclick="app.searchDictionary()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">Search</button>
                        </div>
                        <div id="dictionaryResults"></div>
                    </div>
                `;

                const certificatesHtml = this.state.certificates.length > 0 ? `
                    <div class="mt-16 bg-gradient-to-r from-yellow-50 to-orange-50 rounded-xl shadow-lg p-8">
                        <h3 class="text-3xl font-bold text-gray-900 mb-6">🏆 Your Certificates</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            ${this.state.certificates.map(cert => `
                                <div class="bg-white rounded-lg shadow-md p-6 border-2 border-yellow-400 text-center">
                                    <p style="font-size: 2rem;">🏅</p>
                                    <p class="font-bold text-gray-800 capitalize">${cert.level} Level</p>
                                    <p class="text-sm text-gray-600">Completed: ${cert.date}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : '';

                return `
                    <nav class="bg-white shadow-md">
                        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <h1 class="text-2xl font-bold text-gray-800">🌍 FrenchFlow</h1>
                            </div>
                            <p class="text-gray-600">🎙️ Learn French with Pronunciation</p>
                        </div>
                    </nav>
                    <div class="max-w-7xl mx-auto px-4 py-16 text-center">
                        <h2 class="text-5xl font-bold text-gray-900 mb-4">Welcome to FrenchFlow</h2>
                        <p class="text-xl text-gray-600 mb-2">Learn French completely free!</p>
                        <p class="text-lg text-blue-600 font-semibold mb-8">🔊 Click speaker icons to hear pronunciations!</p>
                        ${statsHtml}
                        ${levelSelectHtml}
                        ${dictionaryHtml}
                        ${certificatesHtml}
                    </div>
                `;
            }

            renderLessons() {
                const currentLessonData = this.lessons[this.state.userLevel][this.state.currentLesson];
                const totalLessons = this.lessons[this.state.userLevel].length;
                const progressPercent = ((this.state.currentLesson + 1) / totalLessons) * 100;

                if (this.state.quizScore === null) {
                    return `
                        <nav class="bg-white shadow-md">
                            <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
                                <button onclick="app.setState({currentPage: 'home', userLevel: null, quizScore: null, currentLesson: 0})" class="flex items-center gap-2 text-blue-600 hover:text-blue-800 font-semibold">⬅️ Back to Home</button>
                                <h1 class="text-2xl font-bold text-gray-800">${this.state.userLevel.charAt(0).toUpperCase() + this.state.userLevel.slice(1)} Level</h1>
                                <div></div>
                            </div>
                        </nav>
                        <div class="max-w-7xl mx-auto px-4 py-8">
                            <div class="mb-8">
                                <p class="text-sm font-semibold text-gray-600 mb-2">Lesson ${this.state.currentLesson + 1} of ${totalLessons}</p>
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div class="bg-gradient-to-r from-blue-500 to-purple-500 h-2 rounded-full" style="width: ${progressPercent}%"></div>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <div class="lg:col-span-2">
                                    <div class="bg-white rounded-xl shadow-lg p-8">
                                        <h2 class="text-4xl font-bold text-gray-900 mb-6">${currentLessonData.title}</h2>
                                        <div class="space-y-6">
                                            ${currentLessonData.content.map((item, idx) => `
                                                <div class="bg-gradient-to-r from-blue-50 to-purple-50 rounded-lg p-6 border-l-4 border-blue-500">
                                                    <div class="flex items-start justify-between mb-3">
                                                        <div class="flex-1">
                                                            <div class="flex items-center gap-3 mb-2">
                                                                <p class="text-2xl font-bold text-blue-600">${item.phrase}</p>
                                                                <button onclick="app.speakText('${item.phrase}')" class="bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700 transition speak-btn">🔊</button>
                                                            </div>
                                                            <p class="text-sm text-gray-600 font-mono bg-white px-3 py-1 rounded inline-block mb-2">📝 ${item.pronunciation}</p>
                                                            <p class="text-lg text-gray-700 font-semibold mt-2">${item.translation}</p>
                                                        </div>
                                                    </div>
                                                    <p class="text-sm text-gray-600 italic">Context: ${item.context}</p>
                                                </div>
                                            `).join('')}
                                        </div>
                                        <div class="flex gap-4 mt-8">
                                            <button onclick="app.prevLesson()" ${this.state.currentLesson === 0 ? 'disabled style="opacity: 0.5;"' : ''} class="px-6 py-3 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition">⬅️ Previous</button>
                                            ${this.state.currentLesson === totalLessons - 1 ?
                                                `<button onclick="app.setState({currentPage: 'quiz', currentQuestion: 0, selectedAnswers: []})" class="flex-1 px-6 py-3 bg-gradient-to-r from-green-500 to-green-600 text-white rounded-lg hover:shadow-lg transition font-semibold">Take Quiz ➡️</button>`
                                                : `<button onclick="app.nextLesson()" class="flex-1 px-6 py-3 bg-gradient-to-r from-blue-500 to-purple-500 text-white rounded-lg hover:shadow-lg transition font-semibold">Next Lesson ➡️</button>`
                                            }
                                        </div>
                                    </div>
                                </div>
                                <div class="bg-white rounded-xl shadow-lg p-6 h-fit">
                                    <h3 class="text-xl font-bold text-gray-900 mb-4">Key Words 🎙️</h3>
                                    <div class="space-y-3">
                                        ${currentLessonData.content.map((item, idx) => `
                                            <div class="bg-blue-50 p-3 rounded-lg border-l-2 border-blue-500">
                                                <div class="flex items-center justify-between gap-2">
                                                    <div class="flex-1">
                                                        <p class="font-semibold text-blue-600">${item.phrase}</p>
                                                        <p class="text-xs text-gray-500 font-mono">${item.pronunciation}</p>
                                                        <p class="text-sm text-gray-600">${item.translation}</p>
                                                    </div>
                                                    <button onclick="app.speakText('${item.phrase}')" class="bg-blue-600 text-white p-1 rounded hover:bg-blue-700 transition speak-btn flex-shrink-0">🔊</button>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    const passed = this.state.quizScore >= 6;
                    return `
                        <nav class="bg-white shadow-md">
                            <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
                                <h1 class="text-2xl font-bold text-gray-800">Quiz Results</h1>
                            </div>
                        </nav>
                        <div class="max-w-7xl mx-auto px-4 py-16">
                            <div class="bg-white rounded-xl shadow-lg p-12 text-center max-w-2xl mx-auto">
                                ${passed ? `
                                    <p style="font-size: 3rem;">✅</p>
                                    <h2 class="text-4xl font-bold text-gray-900 mb-4">Excellent! 🎉</h2>
                                    <p class="text-xl text-gray-600 mb-2">Your Score: ${this.state.quizScore}/8</p>
                                    <p class="text-gray-600 mb-8">You've passed and earned your certificate!</p>
                                    <div class="bg-gradient-to-r from-yellow-100 to-orange-100 rounded-lg p-8 mb-8 border-2 border-yellow-400">
                                        <p style="font-size: 3rem;">🏅</p>
                                        <p class="text-2xl font-bold text-gray-800 capitalize mb-2">${this.state.userLevel} Level Certificate</p>
                                        <p class="text-gray-600">Congratulations!</p>
                                    </div>
                                ` : `
                                    <p style="font-size: 3rem;">⚠️</p>
                                    <h2 class="text-4xl font-bold text-gray-900 mb-4">Keep Trying! 💪</h2>
                                    <p class="text-xl text-gray-600 mb-2">Your Score: ${this.state.quizScore}/8</p>
                                    <p class="text-gray-600 mb-8">You need 6 or more correct answers. Review and try again!</p>
                                `}
                                <div class="flex gap-4">
                                    <button onclick="app.setState({currentPage: 'home', userLevel: null, quizScore: null, currentLesson: 0})" class="flex-1 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-semibold">Go Home</button>
                                    <button onclick="app.setState({quizScore: null, currentLesson: 0})" class="flex-1 px-6 py-3 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition font-semibold">Review Lessons</button>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }

            renderQuiz() {
                const quiz = this.quizzes[this.state.userLevel];
                const currentQuestion = quiz[this.state.currentQuestion];
                const totalQuestions = quiz.length;
                const progressPercent = ((this.state.currentQuestion + 1) / totalQuestions) * 100;

                return `
                    <nav class="bg-white shadow-md">
                        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
                            <h1 class="text-2xl font-bold text-gray-800">Quiz Time! 📝</h1>
                            <p class="text-gray-600">Question ${this.state.currentQuestion + 1} of ${totalQuestions}</p>
                        </div>
                    </nav>
                    <div class="max-w-4xl mx-auto px-4 py-8">
                        <div class="mb-8">
                            <div class="w-full bg-gray-200 rounded-full h-3">
                                <div class="bg-gradient-to-r from-blue-500 to-purple-500 h-3 rounded-full" style="width: ${progressPercent}%"></div>
                            </div>
                        </div>
                        <div class="bg-white rounded-xl shadow-lg p-8 mb-8">
                            <h2 class="text-3xl font-bold text-gray-900 mb-8">${currentQuestion.question}</h2>
                            <div class="space-y-3">
                                ${currentQuestion.options.map((option, idx) => `
                                    <button onclick="app.selectAnswer(${idx})" class="w-full p-4 text-left rounded-lg border-2 transition ${
                                        this.state.selectedAnswers[this.state.currentQuestion] === idx
                                            ? 'border-blue-500 bg-blue-50'
                                            : 'border-gray-300 bg-gray-50 hover:border-gray-400'
                                    }">
                                        <span class="font-semibold text-gray-800">${option}</span>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="app.prevQuestion()" ${this.state.currentQuestion === 0 ? 'disabled style="opacity: 0.5;"' : ''} class="px-6 py-3 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition">⬅️ Previous</button>
                            ${this.state.currentQuestion === totalQuestions - 1 ?
                                `<button onclick="app.submitQuiz()" class="flex-1 px-6 py-3 bg-gradient-to-r from-green-500 to-green-600 text-white rounded-lg hover:shadow-lg transition font-semibold">Submit Quiz</button>`
                                : `<button onclick="app.nextQuestion()" class="flex-1 px-6 py-3 bg-gradient-to-r from-blue-500 to-purple-500 text-white rounded-lg hover:shadow-lg transition font-semibold">Next Question ➡️</button>`
                            }
                        </div>
                    </div>
                `;
            }

            setState(newState) {
                this.state = { ...this.state, ...newState };
                if (newState.searchTerm !== undefined) {
                    document.getElementById('searchInput').value = newState.searchTerm;
                }
                this.render();
            }

            nextLesson() {
                this.setState({ currentLesson: this.state.currentLesson + 1 });
            }

            prevLesson() {
                this.setState({ currentLesson: Math.max(0, this.state.currentLesson - 1) });
            }

            nextQuestion() {
                this.setState({ currentQuestion: this.state.currentQuestion + 1 });
            }

            prevQuestion() {
                this.setState({ currentQuestion: Math.max(0, this.state.currentQuestion - 1) });
            }

            selectAnswer(index) {
                const newAnswers = [...this.state.selectedAnswers];
                newAnswers[this.state.currentQuestion] = index;
                this.setState({ selectedAnswers: newAnswers });
            }

            submitQuiz() {
                const quiz = this.quizzes[this.state.userLevel];
                let score = 0;
                this.state.selectedAnswers.forEach((answer, idx) => {
                    if (answer === quiz[idx].correct) score++;
                });
                this.handleQuizSubmit(score);
                this.setState({ currentPage: 'lessons' });
            }

            render() {
                const app = document.getElementById('app');
                let content = '';

                switch (this.state.currentPage) {
                    case 'home':
                        content = this.renderHome();
                        break;
                    case 'lessons':
                        content = this.renderLessons();
                        break;
                    case 'quiz':
                        content = this.renderQuiz();
                        break;
                }

                app.innerHTML = content;

                // Setup search input listener if on home page
                if (this.state.currentPage === 'home') {
                    const searchInput = document.getElementById('searchInput');
                    if (searchInput) {
                        searchInput.addEventListener('input', (e) => {
                            this.setState({ searchTerm: e.target.value });
                            this.searchDictionary();
                        });

                        // Render dictionary results
                        const resultsDiv = document.getElementById('dictionaryResults');
                        if (this.state.dictionaryResults.length > 0) {
                            resultsDiv.innerHTML = `
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                                    ${this.state.dictionaryResults.map((entry, idx) => `
                                        <div class="bg-blue-50 rounded-lg p-4 border-l-4 border-blue-500 hover:shadow-md transition">
                                            <div class="flex items-center justify-between mb-2">
                                                <div>
                                                    <span class="text-2xl font-bold text-blue-600">${entry.french}</span>
                                                    <p class="text-gray-700 font-semibold">${entry.english}</p>
                                                </div>
                                                <button onclick="app.speakText('${entry.french}')" class="bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700 transition ml-2 speak-btn">🔊</button>
                                            </div>
                                            <p class="text-sm text-gray-700 font-mono bg-white p-2 rounded">📝 ${entry.pronunciation}</p>
                                            <p class="text-xs text-gray-500 italic mt-2">${entry.guide}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            `;
                        } else if (this.state.searchTerm && this.state.dictionaryResults.length === 0) {
                            resultsDiv.innerHTML = '<p class="text-gray-500 mt-4">No words found. Try a different search!</p>';
                        } else {
                            resultsDiv.innerHTML = '';
                        }
                    }
                }
            }
        }

        // Initialize app
        const app = new FrenchLearningApp();
        app.render();
    </script>
</body>
</html>
